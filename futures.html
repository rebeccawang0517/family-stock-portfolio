async function saveFS() {
    if (!G.user) return;
    try { await setDoc(doc(db,'futures',G.user.uid),{positions:G.positions,deposits:G.deposits,dayRecords:G.dayRecords.slice(0,200),cfg:G.cfg,updatedAt:Date.now()}); }
    catch(e){ console.warn(e); }
}
async function loadFS() {
    if (!G.user) return;
    try {
        const s = await getDoc(doc(db,'futures',G.user.uid));
        if (s.exists()) {
            const d = s.data();
            if(d.positions)  G.positions  = d.positions;
            if(d.deposits)   G.deposits   = d.deposits;
            if(d.dayRecords) G.dayRecords = d.dayRecords;
            if(d.cfg)        G.cfg = {...G.cfg,...d.cfg};
        }
    } catch(e){ console.warn(e); }
}

// ── 結算日 ────────────────────────────────────────────────────
function thirdWed(y,m){ let c=0; for(let d=1;d<=31;d++){const dt=new Date(y,m,d);if(dt.getMonth()!==m)break;if(dt.getDay()===3){c++;if(c===3)return dt;}} return null; }
function nextSettle(){
    const t=new Date();
    for(let i=0;i<4;i++){
        const m=t.getMonth()+i, y=t.getFullYear()+Math.floor(m/12);
        const s=thirdWed(y,m%12);
        if(s&&s>=t)return s;
    }
    return null;
}
function daysUntil(dt){ return Math.round((new Date(dt)-new Date())/864e5); }

// ── Helpers ───────────────────────────────────────────────────
function fmtNT(n){ return 'NT$'+Math.round(n).toLocaleString('zh-TW'); }
function fmtPct(n){ return (n>=0?'+':'')+n.toFixed(2)+'%'; }

function calcTech(price,pct){
    const p=Math.round(price);
    const ma5=p-Math.round(p*0.0015),ma20=p-Math.round(p*0.005),ma60=p-Math.round(p*0.012);
    const bbMid=ma20,bbUp=Math.round(ma20+p*0.018),bbDn=Math.round(ma20-p*0.018);
    const bbPct=Math.round((p-bbDn)/(bbUp-bbDn)*100);
    const rsi=pct>1.5?72:pct>0.5?62:pct>0?54:pct>-0.5?46:pct>-1.5?38:28;
    const k=Math.min(95,Math.max(5,rsi+5)),dv=Math.min(95,Math.max(5,rsi-3));
    const macd=pct>0.5?Math.round(p*0.001):pct<-0.5?-Math.round(p*0.001):0;
    let sc=0,wt=0;
    const a=(v,w)=>{sc+=v*w;wt+=w;};
    a(p>ma5&&ma5>ma20&&ma20>ma60?1:p<ma5&&ma5<ma20?-1:p>ma20?0.4:-0.3,2);
    a(bbPct>85?-0.3:bbPct<15?0.3:p>bbMid?0.5:-0.4,1.5);
    a(rsi>70?-0.4:rsi<30?0.4:rsi>50?0.5:-0.4,1.5);
    a(k>dv?0.4:-0.4,1.5);
    a(macd>0?0.6:macd<0?-0.6:0,2);
    a(pct>1?0.7:pct>0.3?0.4:pct<-1?-0.7:pct<-0.3?-0.4:0,1.5);
    const score=Math.round((sc/wt+1)/2*100);
    return {score,ma5,ma20,ma60,bbUp,bbDn,bbMid,bbPct,rsi,k,d:dv,macd,
            s1:Math.round(p-p*0.01),s2:Math.round(p-p*0.02),
            r1:Math.round(p+p*0.01),r2:Math.round(p+p*0.02)};
}

// 背景嘗試取得數值（供技術分析推估用）
async function fetchYahooValue(sym){
    const symbol = /^\d/.test(sym) ? sym+'.TW' : sym;
    const urls = [
        'https://corsproxy.io/?url='+encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/'+symbol+'?interval=1d&range=2d'),
        'https://api.allorigins.win/raw?url='+encodeURIComponent('https://query2.finance.yahoo.com/v8/finance/chart/'+symbol+'?interval=1d&range=2d'),
        'https://thingproxy.freeboard.io/fetch/https://query1.finance.yahoo.com/v8/finance/chart/'+symbol+'?interval=1d&range=2d',
    ];
    for(const u of urls){
        try{
            const r = await fetch(u, {signal:AbortSignal.timeout(6000), cache:'no-cache'});
            if(!r.ok) continue;
            const d = await r.json();
            const meta = d?.chart?.result?.[0]?.meta;
            if(!meta) continue;
            const cur  = meta.regularMarketPrice || meta.chartPreviousClose;
            const prev = meta.chartPreviousClose  || meta.previousClose || cur;
            if(cur && cur > 0) return {price:Math.abs(cur), prev:Math.abs(prev), diff:cur-prev, pct:prev>0?(cur-prev)/prev*100:0};
        }catch(e){}
    }
    return null;
}

// 技術分析（在取得數值後更新）
function renderTechSection(){
    function buildTech(data, prefix){
        if(!data || data.price<=0) return;

        const scoreEl = document.getElementById(prefix+'-score');
        const barEl   = document.getElementById(prefix+'-score-bar');
        const techEl  = document.getElementById(prefix+'-tech');
        const srEl    = document.getElementById(prefix+'-sr');
        const miniEl  = document.getElementById(prefix+'-sr-mini');
        if(scoreEl){ scoreEl.textContent=t.score; scoreEl.className='text-2xl font-bold '+(t.score>=65?'text-green-400':t.score<=35?'text-red-400':'text-yellow-400'); }
        if(barEl)  { barEl.style.width=t.score+'%'; barEl.className='h-1.5 rounded-full transition-all '+(t.score>=65?'bg-green-500':t.score<=35?'bg-red-500':'bg-yellow-500'); }
        if(miniEl) { miniEl.innerHTML='S2 <b class="text-red-400">'+t.s2+'</b> S1 <b class="text-red-300">'+t.s1+'</b><br>R1 <b class="text-yellow-300">'+t.r1+'</b> R2 <b class="text-yellow-400">'+t.r2+'</b>'; }
        if(techEl){
            const sigs=[
                {n:'均線',v:data.price>t.ma5&&t.ma5>t.ma20?'多頭排列':data.price<t.ma5&&t.ma5<t.ma20?'空頭排列':'均線糾結',bull:data.price>t.ma5&&t.ma5>t.ma20?1:data.price<t.ma5?-1:0},
                {n:'RSI', v:t.rsi>70?'超買'+t.rsi:t.rsi<30?'超賣'+t.rsi:''+t.rsi,bull:t.rsi>70?-0.5:t.rsi<30?0.5:t.rsi>50?0.4:-0.3},
                {n:'KD',  v:t.k>t.d?'K>D偏多':'K<D偏空',bull:t.k>t.d?0.4:-0.4},
                {n:'MACD',v:t.macd>0?'紅柱+'+t.macd:t.macd<0?'綠柱'+t.macd:'零軸',bull:t.macd>0?0.6:t.macd<0?-0.6:0},
            ];
            techEl.innerHTML=sigs.map(s=>{
                const c=s.bull>0.1?'text-green-400':s.bull<-0.1?'text-red-400':'text-slate-400';
                const bg=s.bull>0.1?'bg-green-900 text-green-300':s.bull<-0.1?'bg-red-900 text-red-300':'bg-slate-700 text-slate-400';
                return '<div class="flex items-center gap-2 py-1.5 border-b border-slate-700 last:border-0 text-sm"><div class="w-1.5 h-1.5 rounded-full flex-shrink-0 '+c.replace('text-','bg-')+'"></div><span class="text-slate-400 w-10 text-xs">'+s.n+'</span><span class="font-semibold '+c+' flex-1 text-xs">'+s.v+'</span><span class="text-xs px-1.5 py-0.5 rounded font-medium '+bg+'">'+(s.bull>0.1?'看多':s.bull<-0.1?'看空':'中性')+'</span></div>';
            }).join('');
        }
        if(srEl) srEl.innerHTML='<div class="grid grid-cols-4 gap-1 mt-2"><div class="bg-red-900 bg-opacity-40 rounded px-2 py-1 text-center"><div class="text-xs text-slate-400">S2</div><div class="font-mono font-bold text-red-400 text-sm">'+t.s2+'</div></div><div class="bg-red-900 bg-opacity-30 rounded px-2 py-1 text-center"><div class="text-xs text-slate-400">S1</div><div class="font-mono font-bold text-red-300 text-sm">'+t.s1+'</div></div><div class="bg-yellow-900 bg-opacity-30 rounded px-2 py-1 text-center"><div class="text-xs text-slate-400">R1</div><div class="font-mono font-bold text-yellow-300 text-sm">'+t.r1+'</div></div><div class="bg-yellow-900 bg-opacity-40 rounded px-2 py-1 text-center"><div class="text-xs text-slate-400">R2</div><div class="font-mono font-bold text-yellow-400 text-sm">'+t.r2+'</div></div></div>';
    }
    buildTech(G.twse, 'mtx');
    buildTech(G.tsmc, 'tsmc');
    // 關聯分析
    const ca=document.getElementById('corr-area');
    if(ca&&G.twse?.price>0&&G.tsmc?.price>0){
        const same=(G.twse.pct>0&&G.tsmc.pct>0)||(G.twse.pct<0&&G.tsmc.pct<0);
        const diff=Math.abs(Math.abs(G.twse.pct)-Math.abs(G.tsmc.pct));
        let cls,label,note;
        if(same&&diff<1){cls='bg-green-900 border-green-600 text-green-300';label='高度同向';note='台積電與加權同步，微台指方向明確';}
        else if(same)   {cls='bg-blue-900 border-blue-600 text-blue-300';label='同向但幅度差異';note='差異 '+diff.toFixed(2)+'%';}
        else            {cls='bg-yellow-900 border-yellow-600 text-yellow-300';label='多空背離';note='方向不同，操作需謹慎';}
        ca.innerHTML='<div class="border '+cls+' rounded-lg px-4 py-2 text-sm mt-0 mb-4"><span class="font-bold">📊 關聯 — '+label+'：</span>'+note+'</div>';
    }
}
// ── 結算橫幅 ──────────────────────────────────────────────────
function renderSettleBanner(){
    const el=document.getElementById('settle-banner');
    if(!el)return;
    const next=nextSettle(); if(!next){el.innerHTML='';return;}
    const diff=Math.round((next-new Date())/864e5);
    const ds=next.toLocaleDateString('zh-TW');
    let cls,msg,sub;
    if(diff===0)     {cls='bg-red-900 border-red-500 text-red-300';     msg='今日結算日';                      sub='波動極大，結算前一小時特別危險。';}
    else if(diff<=2) {cls='bg-red-900 border-red-500 text-red-300';     msg='結算倒數 '+diff+' 天（'+ds+'）';  sub='結算前夕，停損設緊。';}
    else if(diff<=5) {cls='bg-yellow-900 border-yellow-600 text-yellow-300';msg='結算週，剩 '+diff+' 天（'+ds+'）';sub='Gamma 風險上升，注意急拉急殺。';}
    else if(diff<=10){cls='bg-yellow-900 border-yellow-600 text-yellow-300';msg='本月結算 '+diff+' 天後（'+ds+'）';sub='觀察法人換倉。';}
    else             {cls='bg-blue-900 border-blue-600 text-blue-300';  msg='本月結算：'+ds+'（'+diff+' 天後）'; sub='正常操作。';}
    el.innerHTML='<div class="border '+cls+' rounded-lg px-4 py-3 text-sm mb-4"><span class="font-bold">⚠️ '+msg+'</span> — '+sub+'</div>';
}

// ── 快速風控 ──────────────────────────────────────────────────
function renderQuickRisk(){
    const el=document.getElementById('quick-risk');
    if(!el||!G.twse)return;
    const {equity,risk,maxLots,margin}=G.cfg;
    const riskAmt=Math.round(equity*risk/100);
    const p=Math.round(G.twse.price);
    const t=calcTech(p,G.twse.pct);
    const isLong=t.score>=50;
    const sl=isLong?t.s2:t.r2;
    const slPts=Math.abs(p-sl);
    const lots=Math.min(maxLots,Math.max(1,slPts>0?Math.floor(riskAmt/(slPts*PTF)):1));
    el.innerHTML='<div class="grid grid-cols-3 gap-3"><div class="bg-slate-700 rounded-lg p-3"><div class="text-slate-400 text-xs mb-1">最大風險 '+risk+'%</div><div class="font-bold text-red-400 font-mono">'+fmtNT(riskAmt)+'</div></div><div class="bg-slate-700 rounded-lg p-3"><div class="text-slate-400 text-xs mb-1">建議口數</div><div class="font-bold text-slate-100 text-xl">'+lots+' 口</div><div class="text-slate-500 text-xs mt-0.5">停損'+slPts+'點</div></div><div class="bg-slate-700 rounded-lg p-3"><div class="text-slate-400 text-xs mb-1">停損參考</div><div class="font-bold text-red-400 font-mono">'+sl+'</div><div class="text-slate-500 text-xs mt-0.5">'+(isLong?'多單 S2':'空單 R2')+'</div></div></div>';
}

// ── 部位管理 ──────────────────────────────────────────────────
// 每種類別對權益數的影響
// 入金：+  出金：-  成交（買期貨）：0（保證金凍結，不影響權益）
// 平倉損益：+/-  手續費：-  期交稅：-
const TRANS_TYPES = {
    '入金':   { sign: +1,  color: 'text-green-400', bg: 'bg-green-900 text-green-300' },
    '出金':   { sign: -1,  color: 'text-red-400',   bg: 'bg-red-900 text-red-300' },
    '成交':   { sign:  0,  color: 'text-blue-400',  bg: 'bg-blue-900 text-blue-300' },
    '平倉':   { sign: +1,  color: 'text-yellow-400',bg: 'bg-yellow-900 text-yellow-300' },
    '手續費': { sign: -1,  color: 'text-orange-400',bg: 'bg-orange-900 text-orange-300' },
    '期交稅': { sign: -1,  color: 'text-orange-400',bg: 'bg-orange-900 text-orange-300' },
};

function calcEquity(){
    let eq = G.cfg.equity;
    G.deposits.forEach(d => {
        const info = TRANS_TYPES[d.type] || { sign: 0 };
        if(d.type === '平倉' && d.pnlSign !== undefined){
            // 平倉損益有正負
            eq += d.pnlSign * Math.abs(d.amount);
        } else {
            eq += info.sign * Math.abs(d.amount);
        }
    });
    return eq;
}

function renderPositions(){
    const equity=calcEquity();
    const {margin,dangerPct,warnPct,maxLossPct,realized}=G.cfg;
    let totalMargin=0,totalPnl=0;
    G.positions.forEach(p=>{totalMargin+=margin*p.qty;totalPnl+=(p.dir==='多'?p.cur-p.entry:p.entry-p.cur)*PTF*p.qty;});
    const netEquity=equity+totalPnl;
    const ratio=totalMargin>0?totalMargin/netEquity*100:0;
    const dayTotal=realized+totalPnl;
    const ratioColor=ratio>=dangerPct?'text-red-400':ratio>=warnPct?'text-yellow-400':'text-green-400';
    const barColor=ratio>=dangerPct?'bg-red-500':ratio>=warnPct?'bg-yellow-500':'bg-green-500';
    const mEl=document.getElementById('pos-metrics');
    if(mEl){
        let alerts='';
        if(ratio>=dangerPct) alerts+='<div class="border border-red-500 bg-red-900 bg-opacity-40 text-red-300 rounded-lg px-4 py-2 text-sm mb-2">🔴 保證金使用率 '+ratio.toFixed(1)+'%，請立即減倉</div>';
        else if(ratio>=warnPct) alerts+='<div class="border border-yellow-600 bg-yellow-900 bg-opacity-40 text-yellow-300 rounded-lg px-4 py-2 text-sm mb-2">🟡 保證金使用率 '+ratio.toFixed(1)+'% 達黃燈</div>';
        if(dayTotal<-equity*maxLossPct/100) alerts+='<div class="border border-red-500 bg-red-900 bg-opacity-40 text-red-300 rounded-lg px-4 py-2 text-sm mb-2">🔴 今日虧損超過上限，建議停止交易</div>';
        mEl.innerHTML=alerts+'<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4"><div class="bg-slate-700 rounded-lg p-3"><div class="text-slate-400 text-xs mb-1">帳戶淨值（含出入金）</div><div class="font-bold text-slate-100 font-mono text-sm">'+fmtNT(netEquity)+'</div></div><div class="bg-slate-700 rounded-lg p-3"><div class="text-slate-400 text-xs mb-1">未實現損益</div><div class="font-bold font-mono text-sm '+(totalPnl>=0?'text-green-400':'text-red-400')+'">'+(totalPnl>=0?'+':'')+fmtNT(totalPnl)+'</div></div><div class="bg-slate-700 rounded-lg p-3"><div class="text-slate-400 text-xs mb-1">保證金使用率</div><div class="font-bold '+ratioColor+' text-sm">'+ratio.toFixed(1)+'%</div><div class="mt-1.5 bg-slate-600 rounded-full h-1.5 overflow-hidden"><div class="'+barColor+' h-1.5 rounded-full" style="width:'+Math.min(100,ratio).toFixed(1)+'%"></div></div></div><div class="bg-slate-700 rounded-lg p-3"><div class="text-slate-400 text-xs mb-1">今日總損益</div><div class="font-bold font-mono text-sm '+(dayTotal>=0?'text-green-400':'text-red-400')+'">'+(dayTotal>=0?'+':'')+fmtNT(dayTotal)+'</div></div></div>';
    }
    const pl=document.getElementById('pos-list');
    if(!pl)return;
    if(G.positions.length===0){pl.innerHTML='<tr><td colspan="7" class="px-4 py-6 text-center text-slate-500">尚無部位，點擊「新增部位」</td></tr>';return;}
    pl.innerHTML=G.positions.map((p,i)=>{
        const pnl=(p.dir==='多'?p.cur-p.entry:p.entry-p.cur)*PTF*p.qty;
        return '<tr class="border-b border-slate-700"><td class="px-3 py-3 text-center"><select onchange="updPos('+i+',\'dir\',this.value)" class="bg-slate-700 text-slate-100 px-2 py-1 rounded border border-slate-600 text-sm"><option value="多" '+(p.dir==='多'?'selected':'')+'>多</option><option value="空" '+(p.dir==='空'?'selected':'')+'>空</option></select></td><td class="px-3 py-3 text-center"><input type="number" value="'+p.qty+'" min="1" max="99" onchange="updPos('+i+',\'qty\',this.value)" class="w-14 bg-slate-700 text-slate-100 px-2 py-1 rounded border border-slate-600 text-sm text-center font-mono"></td><td class="px-3 py-3 text-center"><input type="number" value="'+p.entry+'" onchange="updPos('+i+',\'entry\',this.value)" class="w-24 bg-slate-700 text-slate-100 px-2 py-1 rounded border border-slate-600 text-sm font-mono"></td><td class="px-3 py-3 text-center"><input type="number" value="'+p.cur+'" onchange="updPos('+i+',\'cur\',this.value)" class="w-24 bg-slate-700 text-slate-100 px-2 py-1 rounded border border-slate-600 text-sm font-mono"></td><td class="px-3 py-3 text-center font-mono font-bold '+(pnl>=0?'text-green-400':'text-red-400')+' text-sm">'+(pnl>=0?'+':'')+fmtNT(pnl)+'</td><td class="px-3 py-3 text-center font-mono text-slate-300 text-xs">'+fmtNT(Math.abs(pnl/PTF/(p.qty||1)))+'/點</td><td class="px-3 py-3 text-center"><button onclick="delPos('+i+')" class="text-red-400 hover:text-red-300 px-2 py-1 rounded text-sm">✕</button></td></tr>';
    }).join('');
    // 出入金歷史
    renderDeposits();
}

// ── 出入金 ────────────────────────────────────────────────────
function renderDeposits(){
    const el=document.getElementById('deposit-history');
    if(!el)return;
    const baseEquity = G.cfg.equity;
    const currentEquity = calcEquity();

    // 各類別統計
    const stats = {};
    Object.keys(TRANS_TYPES).forEach(k=>{ stats[k]=0; });
    G.deposits.forEach(d=>{ if(stats[d.type]!==undefined) stats[d.type]+=Math.abs(d.amount); });

    const sumEl = document.getElementById('equity-summary');
    if(sumEl){
        const items = [
            {label:'初始權益',    val:baseEquity,           color:'text-slate-100',  sign:''},
            {label:'累計入金',    val:stats['入金'],        color:'text-green-400',  sign:'+'},
            {label:'累計出金',    val:stats['出金'],        color:'text-red-400',    sign:'-'},
            {label:'平倉損益',    val:stats['平倉'],        color:'text-yellow-400', sign:'±'},
            {label:'手續費',      val:stats['手續費'],      color:'text-orange-400', sign:'-'},
            {label:'期交稅',      val:stats['期交稅'],      color:'text-orange-400', sign:'-'},
            {label:'目前權益數',  val:currentEquity,        color:'text-blue-400',   sign:'', highlight:true},
        ];
        sumEl.innerHTML = '<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">'
            + items.map(item=>'<div class="bg-slate-700 rounded-lg p-3'+(item.highlight?' border border-blue-500':'')+'"><div class="text-slate-400 text-xs mb-1">'+item.label+'</div><div class="font-bold '+item.color+' font-mono text-sm">'+(item.sign&&item.val>0?item.sign:'')+fmtNT(item.val)+'</div></div>').join('')
            + '</div>';
    }

    if(!G.deposits.length){
        el.innerHTML='<div class="text-slate-500 text-sm text-center py-3">尚無記錄</div>';
        return;
    }

    // 計算每筆記帳後的累計權益
    let runningEq = baseEquity;
    const withEq = G.deposits.slice().reverse().map(d=>{
        const info = TRANS_TYPES[d.type]||{sign:0};
        if(d.type === '平倉' && d.pnlSign !== undefined){
            runningEq += d.pnlSign * Math.abs(d.amount);
        } else {
            runningEq += info.sign * Math.abs(d.amount);
        }
        return {...d, eqAfter: runningEq};
    }).reverse();

    el.innerHTML = '<table class="w-full text-sm">'
        + '<thead><tr class="bg-slate-900 border-b border-slate-700">'
        + '<th class="px-3 py-2 text-left text-slate-300 text-xs">日期</th>'
        + '<th class="px-3 py-2 text-center text-slate-300 text-xs">類別</th>'
        + '<th class="px-3 py-2 text-right text-slate-300 text-xs">金額</th>'
        + '<th class="px-3 py-2 text-right text-slate-300 text-xs">累計權益</th>'
        + '<th class="px-3 py-2 text-left text-slate-300 text-xs">備註</th>'
        + '<th class="px-3 py-2 text-center text-slate-300 text-xs">操作</th>'
        + '</tr></thead><tbody>'
        + withEq.map((d,i)=>{
            const info = TRANS_TYPES[d.type]||{sign:0,color:'text-slate-300',bg:'bg-slate-700 text-slate-300'};
            const amtSign = info.sign > 0 ? '+' : info.sign < 0 ? '-' : '';
            const amtColor = info.sign > 0 ? 'text-green-400' : info.sign < 0 ? 'text-red-400' : 'text-blue-400';
            return '<tr class="border-b border-slate-700 hover:bg-slate-750">'
                + '<td class="px-3 py-2 text-slate-400 text-xs">'+d.date+'</td>'
                + '<td class="px-3 py-2 text-center"><span class="text-xs px-2 py-0.5 rounded font-medium '+info.bg+'">'+d.type+'</span></td>'
                + '<td class="px-3 py-2 text-right font-mono font-bold '+amtColor+' text-sm">'+amtSign+fmtNT(Math.abs(d.amount))+'</td>'
                + '<td class="px-3 py-2 text-right font-mono text-slate-300 text-sm">'+fmtNT(d.eqAfter)+'</td>'
                + '<td class="px-3 py-2 text-slate-400 text-xs">'+(d.note||'—')+'</td>'
                + '<td class="px-3 py-2 text-center"><button onclick="delDeposit('+i+')" class="text-red-400 hover:text-red-300 text-xs px-1.5 py-0.5 rounded">✕</button></td>'
                + '</tr>';
        }).join('')
        + '</tbody></table>';
}

window.addDeposit=(type)=>{

// 成交 / 平倉（可附帶手續費、期交稅）
window.addTrade=(type)=>{
    const dateEl = document.getElementById('trade-date');
    const pnlEl  = document.getElementById('trade-pnl');
    const noteEl = document.getElementById('trade-note');
    const feeEl  = document.getElementById('trade-fee');
    const taxEl  = document.getElementById('trade-tax');
    const date   = dateEl?.value || new Date().toISOString().slice(0,10);
    const pnl    = parseFloat(pnlEl?.value) || 0;
    const note   = noteEl?.value || '';
    const fee    = parseFloat(feeEl?.value) || 0;
    const tax    = parseFloat(taxEl?.value) || 0;

    const entries = [];

    if(type === '成交'){
        // 成交不影響權益，只記錄
        entries.push({date, type:'成交', amount:0, note, id:Date.now().toString()});
    } else {
        // 平倉：先記損益
        if(pnl !== 0){
            entries.push({date, type:'平倉', amount:Math.abs(pnl), note:'損益 '+(pnl>0?'+':'')+pnl.toLocaleString('zh-TW')+(note?' '+note:''), id:Date.now().toString()+'_pnl', pnlSign: pnl >= 0 ? 1 : -1});
        }
    }
    // 手續費（成交和平倉都可以有）
    if(fee > 0) entries.push({date, type:'手續費', amount:fee, note:note||'', id:Date.now().toString()+'_fee'});
    // 期交稅
    if(tax > 0) entries.push({date, type:'期交稅', amount:tax, note:note||'', id:Date.now().toString()+'_tax'});

    if(!entries.length){ alert('請至少填入損益或手續費/期交稅'); return; }

    G.deposits.push(...entries);
    G.deposits.sort((a,b)=>new Date(b.date)-new Date(a.date));

    // 清空欄位
    if(pnlEl)pnlEl.value='';
    if(noteEl)noteEl.value='';
    if(feeEl)feeEl.value='0';
    if(taxEl)taxEl.value='0';
    renderPositions();
    saveFS();
};
window.delDeposit=(i)=>{G.deposits.splice(i,1);renderPositions();saveFS();};

// ── 日曆 ──────────────────────────────────────────────────────
function getImportantEvents(y, m){
    // 台指期結算（第三個週三）
    const settle = thirdWed(y, m);
    // 自動產生已知重要日期
    const known = [];
    // Fed 會議（預設每年8次，約每6-7週，這裡列2026年預估）
    const fedDates2026 = [
        [2026,1,28],[2026,3,18],[2026,4,29],[2026,6,10],
        [2026,7,29],[2026,9,16],[2026,10,28],[2026,12,9]
    ];
    fedDates2026.forEach(([fy,fm,fd])=>{
        if(fy===y && fm-1===m) known.push({day:fd, label:'🇺🇸 Fed 利率決議', color:'bg-blue-700'});
    });
    // 台指期結算
    if(settle) known.push({day:settle.getDate(), label:'⚡ 台指期結算', color:'bg-red-700'});
    return known;
}

function renderCalendar(){
    const today=new Date(), y=today.getFullYear(), m=today.getMonth();
    const months=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    const el=document.getElementById('cal-title');
    if(el)el.textContent=y+'年'+months[m];
    const firstDay=new Date(y,m,1).getDay();
    const daysInMonth=new Date(y,m+1,0).getDate();
    const todayD=today.getDate();
    const events=getImportantEvents(y,m);
    const evMap={};
    events.forEach(e=>{ if(!evMap[e.day]) evMap[e.day]=[]; evMap[e.day].push(e); });
    const grid=document.getElementById('cal-grid');
    if(!grid)return;
    let html='';
    for(let i=0;i<firstDay;i++) html+='<div class="h-20"></div>';
    for(let d=1;d<=daysInMonth;d++){
        const isToday=d===todayD;
        const evs=evMap[d]||[];
        const hasEv=evs.length>0;
        const dow=new Date(y,m,d).getDay();
        const isWeekend=dow===0||dow===6;
        let cellBg=isToday?'bg-blue-800 border-2 border-blue-400':hasEv?'bg-slate-700':'bg-slate-800';
        let numColor=isToday?'text-white font-bold':isWeekend?'text-red-400':'text-slate-300';
        html+='<div class="'+cellBg+' rounded-lg p-1.5 h-20 flex flex-col"><div class="text-xs '+numColor+' mb-1">'+d+'</div>';
        evs.forEach(e=>{
            html+='<div class="'+e.color+' text-white text-xs rounded px-1 py-0.5 mb-0.5 leading-tight truncate">'+e.label+'</div>';
        });
        html+='</div>';
    }
    grid.innerHTML=html;
    renderUpcomingEvents(y,m,events,todayD);
}

function renderUpcomingEvents(y,m,events,todayD){
    const el=document.getElementById('upcoming-events');
    if(!el)return;
    const upcoming=events.filter(e=>e.day>=todayD).sort((a,b)=>a.day-b.day);
    if(!upcoming.length){el.innerHTML='<div class="text-slate-500 text-sm">本月無重要事件</div>';return;}
    el.innerHTML=upcoming.map(e=>{
        const diff=e.day-todayD;
        const label=diff===0?'今天':diff===1?'明天':diff+'天後';
        return '<div class="flex items-center gap-3 py-2 border-b border-slate-700 last:border-0"><div class="'+e.color+' text-white text-xs rounded px-2 py-1 min-w-max">'+e.label+'</div><div class="text-slate-300 text-sm">'+y+'年'+(m+1)+'月'+e.day+'日</div><div class="text-slate-400 text-xs ml-auto">'+label+'</div></div>';
    }).join('');
}

// ── 每日損益 ──────────────────────────────────────────────────
function renderDayHistory(){
    const el=document.getElementById('day-history');
    if(!el)return;
    if(!G.dayRecords.length){el.innerHTML='<tr><td colspan="4" class="px-4 py-4 text-center text-slate-500">尚無記錄</td></tr>';return;}
    const total=G.dayRecords.reduce((s,r)=>s+r.pnl,0);
    const wins=G.dayRecords.filter(r=>r.pnl>0).length;
    const wr=G.dayRecords.length>0?Math.round(wins/G.dayRecords.length*100):0;
    const mEl=document.getElementById('day-summary');
    if(mEl)mEl.innerHTML='<div class="grid grid-cols-3 gap-3 mb-3"><div class="bg-slate-700 rounded-lg p-3"><div class="text-slate-400 text-xs mb-1">累計損益</div><div class="font-bold font-mono '+(total>=0?'text-green-400':'text-red-400')+'">'+(total>=0?'+':'')+fmtNT(total)+'</div></div><div class="bg-slate-700 rounded-lg p-3"><div class="text-slate-400 text-xs mb-1">勝率</div><div class="font-bold text-slate-100">'+wr+'%</div></div><div class="bg-slate-700 rounded-lg p-3"><div class="text-slate-400 text-xs mb-1">筆數</div><div class="font-bold text-slate-100">'+G.dayRecords.length+'</div></div></div>';
    el.innerHTML=G.dayRecords.slice(0,30).map(r=>'<tr class="border-b border-slate-700"><td class="px-3 py-2 text-slate-400 text-sm">'+r.date+'</td><td class="px-3 py-2 font-mono font-bold text-sm '+(r.pnl>=0?'text-green-400':'text-red-400')+'">'+(r.pnl>=0?'+':'')+fmtNT(r.pnl)+'</td><td class="px-3 py-2 text-slate-400 text-sm">'+(r.note||'—')+'</td><td class="px-3 py-2 text-center"><button onclick="delDay(\''+r.id+'\')" class="text-red-400 hover:text-red-300 text-xs">✕</button></td></tr>').join('');
}
window.addDayRecord=()=>{
    const date=document.getElementById('rec-date')?.value;
    const pnl=parseFloat(document.getElementById('rec-pnl')?.value)||0;
    const note=document.getElementById('rec-note')?.value||'';
    if(!date){alert('請選擇日期');return;}
    G.dayRecords.unshift({id:Date.now().toString(),date,pnl,note});
    G.dayRecords.sort((a,b)=>new Date(b.date)-new Date(a.date));
    if(document.getElementById('rec-pnl'))document.getElementById('rec-pnl').value='';
    if(document.getElementById('rec-note'))document.getElementById('rec-note').value='';
    renderDayHistory();saveFS();
};
window.delDay=(id)=>{G.dayRecords=G.dayRecords.filter(r=>r.id!==id);renderDayHistory();saveFS();};

                        <label class="text-slate-300 text-sm font-medium">紅燈閾值 %</label>
                        <input type="number" id="cfg-danger" value="90" step="1" class="bg-slate-700 text-slate-100 px-3 py-1.5 rounded border border-slate-600 focus:border-blue-500 focus:outline-none w-36 text-right font-mono text-sm">
                    </div>
                    <div class="text-xs text-slate-500">保證金使用率超過此值顯示紅燈</div>
                </div>
            </div>
            <div class="flex items-center gap-3 mt-6">
                <button onclick="saveSettings()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-lg font-semibold transition-colors">✓ 儲存設定</button>
                <span id="cfg-saved" class="hidden text-green-400 text-sm">✓ 已儲存到 Firebase</span>
            </div>
        </div>
    </div>

</div>
</div>

<script>
function switchTab(name){
    ['live','positions','calendar','settings'].forEach(function(t){
        var btn=document.getElementById('tab-'+t);
        var pane=document.getElementById('pane-'+t);
        if(btn){btn.classList.toggle('active',t===name);if(t!==name)btn.classList.add('text-slate-400');else btn.classList.remove('text-slate-400');}
        if(pane)pane.classList.toggle('active',t===name);
    });
    if(name==='calendar' && typeof renderCalendar==='function') renderCalendar();
    if(name==='positions' && typeof renderPositions==='function'){ renderPositions(); renderDayHistory(); }
    if(name==='live' && !window._tvLoaded){ renderMainChart(); window._tvLoaded=true; }
}
window.addEventListener('load', function(){
    var today=new Date().toISOString().slice(0,10);
    var r=document.getElementById('rec-date'); if(r)r.value=today;
    var d=document.getElementById('dep-date'); if(d)d.value=today;
    // 自動載入主圖
    setTimeout(function(){ if(typeof renderMainChart==='function') renderMainChart(); }, 500);
});
</script>
</body>
</html>
